<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; overflow: hidden; background: #004e64; }
        #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0, 50, 70, 0.8); color: white; cursor: pointer; font-size: 24px; z-index: 10; }
        #top-bar { position: absolute; top: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.5); color: white; display: flex; align-items: center; padding-left: 20px; z-index: 5; }
    </style>
</head>
<body>
    <div id="start-overlay" onclick="startExperience()">Tap to Enter the Zen Tank</div>
    <div id="top-bar">Zen Tank Control Panel</div>
    <canvas id="tank"></canvas>

    <script>
        const canvas = document.getElementById('tank');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        const ambientSound = new Audio('ocean.mp3'); 
        ambientSound.loop = true;

        // Use CLEAN filenames here
        const bg = new Image(); bg.src = 'FishTank.png';
        const f1 = new Image(); f1.src = 'fish1.png';

        function animate() {
            // Only draw if images are loaded
            if (bg.complete) ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
            if (f1.complete) ctx.drawImage(f1, 100, 100, 100, 100);
            requestAnimationFrame(animate);
        }

        function startExperience() {
            document.getElementById('start-overlay').style.display = 'none';
            ambientSound.play();
            animate();
        }
    </script>
</body>
</html>
